<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Received | DE Mentorship</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, rgba(37, 99, 235, 0.05), transparent);
            padding: 2rem;
        }
        .thanks-card {
            text-align: center;
            background: white;
            padding: 4rem 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            max-width: 600px;
            width: 100%;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
        }
        .thanks-card h1 {
            font-size: 3rem;
            margin-bottom: 1.5rem;
        }
        .thanks-card p {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="thanks-card">
        <div class="success-icon">
            <i data-lucide="check-circle-2" size="48"></i>
        </div>
        <h1 class="text-gradient">Application Received</h1>
        <p>
            Your response has been received. Please wait for further announcements. <br>
            Selected applicants will be contacted via email within the next few days.
        </p>
        <a href="index.html" class="btn btn-primary">Return to Homepage</a>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
