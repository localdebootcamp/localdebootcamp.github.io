<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Received | DE Mentorship</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --bg-main: #ffffff;
            --bg-alt: #f1f5f9;
            --border: rgba(226, 232, 240, 0.8);
            --radius-lg: 24px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            background-image: radial-gradient(at 50% 50%, rgba(37, 99, 235, 0.05) 0px, transparent 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
            color: var(--text-secondary);
        }

        .success-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-lg);
            padding: 5rem 3rem;
            text-align: center;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .check-wrapper {
            width: 90px;
            height: 90px;
            background: var(--text-primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2.5rem;
            box-shadow: 0 15px 30px -5px rgba(15, 23, 42, 0.3);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.25rem;
            line-height: 1.8;
            margin-bottom: 3rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2.5rem;
            background: var(--primary);
            color: white;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
            gap: 0.75rem;
            font-size: 1.125rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="check-wrapper">
            <i data-lucide="party-popper" size="48"></i>
        </div>
        <h1>Application Sent!</h1>
        <p>
            Your response has been received. Please wait for further announcements. <br>
            Selected applicants for the **Founding Cohort** will be contacted personally via email.
        </p>
        <a href="index.html" class="btn">
            <i data-lucide="arrow-left"></i> Home
        </a>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
